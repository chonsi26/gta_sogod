<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA Sogod</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #000;
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: -webkit-optimize-contrast; /* Safari */
            image-rendering: crisp-edges;               /* Firefox */
        }

        /* ── Save Menu Overlay ── */
        #saveMenu {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 100;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        #saveMenu.open { display: flex; }

        #savePanel {
            background: #0a1428;
            border: 4px solid #FFD700;
            border-radius: 16px;
            padding: 28px 36px 24px;
            width: 560px;
            max-width: 96vw;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            box-shadow: 0 0 50px rgba(255,215,0,0.25);
        }
        #savePanel h2 {
            text-align: center;
            color: #FFD700;
            font-size: 24px;
            margin: 0 0 4px;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(255,215,0,0.5);
            flex-shrink: 0;
        }
        .panel-subtitle {
            text-align: center;
            color: #556688;
            font-size: 11px;
            margin-bottom: 18px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* New Save bar */
        #newSaveBar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        #newSaveName {
            flex: 1;
            background: #111e36;
            border: 2px solid #2a4a7a;
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 9px 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        #newSaveName::placeholder { color: #334466; }
        #newSaveName:focus { border-color: #FFD700; }
        #btnNewSave {
            background: #1a6a2a;
            color: #88ffaa;
            border: 2px solid #2a9a4a;
            border-radius: 8px;
            padding: 9px 18px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: background 0.15s;
        }
        #btnNewSave:hover { background: #2a8a3a; }

        /* Saves list */
        #savesList {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: #2a4a7a #0a1428;
        }
        #savesList::-webkit-scrollbar { width: 6px; }
        #savesList::-webkit-scrollbar-track { background: #0a1428; }
        #savesList::-webkit-scrollbar-thumb { background: #2a4a7a; border-radius: 4px; }

        .save-card {
            background: #111e36;
            border: 2px solid #1e3050;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 10px;
            transition: border-color 0.15s;
        }
        .save-card:hover { border-color: #2a5a9a; }
        .save-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        .save-card-name {
            color: #FFD700;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            word-break: break-all;
        }
        .save-card-date {
            color: #445566;
            font-size: 10px;
            text-align: right;
            white-space: nowrap;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .save-card-info {
            color: #7799bb;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .save-card-actions { display: flex; gap: 8px; }

        .btn {
            flex: 1;
            padding: 7px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.15s;
        }
        .btn-load   { background: #1a3a7a; color: #88aaff; border: 1px solid #2a5aaa; }
        .btn-load:hover { background: #2a4a9a; }
        .btn-delete { background: #5a1515; color: #ffaaaa; border: 1px solid #8a2525; }
        .btn-delete:hover { background: #7a2020; }

        #noSaves {
            text-align: center;
            color: #334455;
            font-size: 13px;
            padding: 30px 0;
            font-style: italic;
        }

        #saveMsg {
            text-align: center;
            min-height: 18px;
            font-size: 12px;
            color: #88ffaa;
            margin-top: 10px;
            flex-shrink: 0;
        }
        #saveMsg.error { color: #ff8888; }
        .close-hint {
            text-align: center;
            color: #334455;
            font-size: 10px;
            margin-top: 8px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        #saveHint {
            position: fixed; bottom: 18px; right: 22px;
            background: rgba(0,0,0,0.7); color: #FFD700;
            font-family: 'Courier New', monospace; font-size: 12px;
            padding: 6px 14px; border-radius: 8px; border: 1px solid #FFD700;
            pointer-events: none; z-index: 50; opacity: 0.75;
        }

        /* ── Mobile Touch Controls ── */
        #touchControls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 40;
            flex-direction: row;
            gap: 80px;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            #touchControls {
                display: flex;
            }
        }

        #dpadContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .touch-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        #jumpContainer {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .touch-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid #FFD700;
            border-radius: 8px;
            color: #FFD700;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            font-weight: bold;
        }

        .touch-btn:active {
            background: rgba(255, 215, 0, 0.6);
            transform: scale(0.95);
        }

        .touch-btn-hidden {
            visibility: hidden;
        }

        #btnJump {
            width: 80px;
            height: 80px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <!-- Mobile Touch Controls -->
    <div id="touchControls">
        <div id="dpadContainer">
            <div class="touch-row">
                <div class="touch-btn touch-btn-hidden"></div>
                <div class="touch-btn" id="btnUp">▲</div>
                <div class="touch-btn touch-btn-hidden"></div>
            </div>
            <div class="touch-row">
                <div class="touch-btn" id="btnLeft">◀</div>
                <div class="touch-btn touch-btn-hidden"></div>
                <div class="touch-btn" id="btnRight">▶</div>
            </div>
            <div class="touch-row">
                <div class="touch-btn touch-btn-hidden"></div>
                <div class="touch-btn" id="btnDown">▼</div>
                <div class="touch-btn touch-btn-hidden"></div>
            </div>
        </div>
        <div id="jumpContainer">
            <div class="touch-btn" id="btnJump">JUMP</div>
        </div>
    </div>

    <!-- Save / Load Menu Overlay -->
    <div id="saveMenu">
        <div id="savePanel">
            <h2>⚡ SAVE DATA ⚡</h2>
            <p class="panel-subtitle">UNLIMITED SAVES  •  F5 TO OPEN / CLOSE</p>

            <!-- New Save Row -->
            <div id="newSaveBar">
                <input id="newSaveName" type="text" maxlength="64"
                       placeholder="Enter save name..." autocomplete="off" />
                <button id="btnNewSave" onclick="saveGame()">💾 SAVE</button>
            </div>

            <!-- Scrollable saves list -->
            <div id="savesList">
                <div id="noSaves">No saves yet. Start playing and save your progress!</div>
            </div>

            <div id="saveMsg"></div>
            <p class="close-hint">F5  /  ESC — CLOSE</p>
        </div>
    </div>

    <!-- In-game hint -->
    <div id="saveHint" style="display:none">F5 — SAVE / LOAD</div>

        function playMenuMusic() {
            if (musicPlaying) return;
            menuMusic.play().then(() => { musicPlaying = true; }).catch(() => {});
        }

        function stopMenuMusic() {
            menuMusic.pause();

        // Check collision for a single point (pixel coordinates)
        function checkCollisionPoint(x, y) {
            // Check if the point is outside the absolute map pixel boundaries
            if (x < 0 || x >= MAP_PIXEL_WIDTH || y < 0 || y >= MAP_PIXEL_HEIGHT) {
                return true; // Point is outside the map, consider it a collision
            }

            // Convert pixel coordinates to tile coordinates
            const tileX = Math.floor(x / TILE_SIZE);
            const tileY = Math.floor(y / TILE_SIZE);

            // Ensure tile coordinates are within the map array bounds
            if (tileY < 0 || tileY >= MAP_HEIGHT || tileX < 0 || tileX >= MAP_WIDTH) {
                // This case should ideally be caught by the pixel boundary check above,
                // but it's a good safeguard for unexpected floating point issues.
                return true;
            }

            // Check if the tile at these coordinates is a collision tile
            return collisionTiles.includes(map[tileY][tileX]);
        }
        
        // Generic collision check function for any character (player or NPC)
        function checkCharacterCollision(character, dx, dy) {
            const epsilon = 0.1;
            const newX = character.x + dx;
            const newY = character.y + dy;
            
            // Check corners for collision
            const collidesTL = checkCollisionPoint(newX, newY);
            const collidesTR = checkCollisionPoint(newX + character.width - epsilon, newY);
            const collidesBL = checkCollisionPoint(newX, newY + character.height - epsilon);
            const collidesBR = checkCollisionPoint(newX + character.width - epsilon, newY + character.height - epsilon);
            
            // Check if any of the corners collide with a map collision tile
            if (dx !== 0 && (collidesTL || collidesTR || collidesBL || collidesBR)) {
                return true;
            }
            if (dy !== 0 && (collidesTL || collidesTR || collidesBL || collidesBR)) {
                return true;
            }
            return false;
        }

        // Update player position
        function updatePlayer() {
            let dx = 0;
            let dy = 0;
            let isMoving = false;

            if (keys.ArrowUp || keys.w || keys.W) {
                dy = -player.speed;
                currentPlayerSprite = playerSprites.w;
                isMoving = true;
            }
            if (keys.ArrowDown || keys.s || keys.S) {
                dy = player.speed;
                currentPlayerSprite = playerSprites.s;
                isMoving = true;
            }
            if (keys.ArrowLeft || keys.a || keys.A) {
                dx = -player.speed;
                currentPlayerSprite = playerSprites.a;
                isMoving = true;
            }
            if (keys.ArrowRight || keys.d || keys.D) {
                dx = player.speed;
                currentPlayerSprite = playerSprites.d;
                isMoving = true;
            }

            // Jump logic
            if (keys[' '] && !player.isJumping) {
                player.isJumping = true;
                player.jumpVelocity = -10; // Initial jump velocity (upwards)
                player.groundY = player.y; // Store current Y as ground level for this jump
            }

            if (player.isJumping) {
                player.y += player.jumpVelocity;
                player.jumpVelocity += 0.5; // Apply gravity

                // If player lands back on or below groundY
                if (player.y >= player.groundY) {
                    player.y = player.groundY; // Snap to ground
                    player.isJumping = false;
                    player.jumpVelocity = 0;
                }
            }


            // Update animation frame if moving (only horizontal movement affects bobbing)
            if (isMoving && !player.isJumping) { // Only bob if not jumping
                player.animationFrame += player.animationSpeed;
                // Use Math.sin for a smooth up and down motion
                // The 2 here controls the amplitude (how much it moves up/down)
                // The 0.5 controls the frequency (how fast it bobs)
                player.animationOffset = Math.sin(player.animationFrame) * 2; 
            } else if (!player.isJumping) { // Reset animation when not moving and not jumping
                player.animationFrame = 0;
                player.animationOffset = 0;
            }

            let newX = player.x + dx;
            let newY = player.y + dy; // This newY is for horizontal/vertical movement, not jump

            // --- Collision detection for movement ---
            // Only apply collision for horizontal/vertical movement, not jump
            if (!player.isJumping) {
                const epsilon = 0.1; 

                // Check corners for collision
                const collidesTL = checkCollisionPoint(newX, newY);
                const collidesTR = checkCollisionPoint(newX + player.width - epsilon, newY);
                const collidesBL = checkCollisionPoint(newX, newY + player.height - epsilon);
                const collidesBR = checkCollisionPoint(newX + player.width - epsilon, newY + player.height - epsilon);

                // If moving horizontally (dx != 0)
                if (dx !== 0) {
                    const willCollideX = (collidesTL || collidesBL) || (collidesTR || collidesBR);
                    if (!willCollideX) {
                        player.x = newX;
                    }
                }

                // If moving vertically (dy != 0)
                if (dy !== 0) {
                    const willCollideY = (collidesTL || collidesTR) || (collidesBL || collidesBR);
                    if (!willCollideY) {
                        player.y = newY;
                    }
                }
            } else {
                // If jumping, still allow horizontal movement
                player.x = newX;
            }


            // --- Absolute map boundary clamping for the player ---
            player.x = Math.max(0, Math.min(player.x, MAP_PIXEL_WIDTH - player.width));
            
            // Check for city transition
            const latestToNewY = LATEST_CITY_HEIGHT * TILE_SIZE;
            const newToPalletY = (LATEST_CITY_HEIGHT + 1 + NEW_CITY_HEIGHT) * TILE_SIZE;

            if (player.y < latestToNewY - player.height) {
                // Player is in latest city
            } else if (player.y > latestToNewY && player.y < newToPalletY - player.height) {
                // Player is in new city
            } else if (player.y > newToPalletY) {
                // Player is in pallet city
            }

            // Player's Y is clamped to the groundY when not jumping, otherwise it's handled by jump logic
            if (!player.isJumping) {
                player.y = Math.max(0, Math.min(player.y, MAP_PIXEL_HEIGHT - player.height));
            }
        }
        
        // Update NPC positions
        function updateNPCs() {
            const directionsMap = {
                'w': { dx: 0, dy: -NPC_SPEED },
                's': { dx: 0, dy: NPC_SPEED },
                'a': { dx: -NPC_SPEED, dy: 0 },
                'd': { dx: NPC_SPEED, dy: 0 }
            };

            for (const npc of npcs) {
                // Check if it's time to change direction
                npc.pathingTime++;
                if (npc.pathingTime >= npc.pathingMaxTime) {
                    // Choose a new random direction
                    const newDirection = directions[Math.floor(Math.random() * directions.length)];
                    npc.direction = newDirection;
                    // Reset pathing timer and set a new random max time
                    npc.pathingTime = 0;
                    npc.pathingMaxTime = Math.floor(Math.random() * 120) + 60;
                }

                const { dx, dy } = directionsMap[npc.direction];
                const newX = npc.x + dx;
                const newY = npc.y + dy;

                // Check for collision with map tiles
                const willCollide = checkCharacterCollision(npc, dx, dy);
                if (!willCollide) {
                    npc.x = newX;
                    npc.y = newY;
                } else {
                    // If a collision is imminent, change direction immediately
                    npc.direction = directions[Math.floor(Math.random() * directions.length)];
                    npc.pathingTime = 0;
                    npc.pathingMaxTime = Math.floor(Math.random() * 120) + 60;
                }
                
                // Keep NPCs within the Pallet City boundaries
                const palletCityMinY = (PALLET_CITY_Y_OFFSET + 1) * TILE_SIZE;
                const palletCityMaxY = MAP_PIXEL_HEIGHT - npc.height;

                if (npc.y < palletCityMinY || npc.y > palletCityMaxY || npc.x < 0 || npc.x > MAP_PIXEL_WIDTH - npc.width) {
                    // If an NPC goes out of bounds, snap them back to a random valid location in Pallet City
                    const { x: respawnX, y: respawnY } = getRandomValidNpcPosition();
                    npc.x = respawnX;
                    npc.y = respawnY;
                    npc.direction = directions[Math.floor(Math.random() * directions.length)];
                }

                // Update animation frame based on movement
                if (dx !== 0 || dy !== 0) {
                    npc.animationFrame += npc.animationSpeed;
                    npc.animationOffset = Math.sin(npc.animationFrame) * 2;
                } else {
                    npc.animationFrame = 0;
                    npc.animationOffset = 0;
                }
            }
        }

        // Update camera to follow player
        function updateCamera() {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;

            const scaledCanvasWidth = canvas.width / camera.zoom;
            const scaledCanvasHeight = canvas.height / camera.zoom;

            camera.x = playerCenterX - scaledCanvasWidth / 2;
            camera.y = playerCenterY - scaledCanvasHeight / 2;

            const maxCameraX = MAP_PIXEL_WIDTH - scaledCanvasWidth;
            const maxCameraY = MAP_PIXEL_HEIGHT - scaledCanvasHeight;

            if (maxCameraX <= 0) {
                camera.x = (MAP_PIXEL_WIDTH - scaledCanvasWidth) / 2;
            } else {
                camera.x = Math.max(0, Math.min(camera.x, maxCameraX));
            }

            if (maxCameraY <= 0) {
                camera.y = (MAP_PIXEL_HEIGHT - scaledCanvasHeight) / 2;
            } else {
                camera.y = Math.max(0, Math.min(camera.y, maxCameraY));
            }
        }

        // Draw the map
        function drawMap() {
            ctx.save();
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            
            // Draw latest city (top section)
            ctx.drawImage(latestCityImage, 0, 0, MAP_PIXEL_WIDTH, LATEST_CITY_HEIGHT * TILE_SIZE);
            
            // Draw new city directly after the latest city
            ctx.drawImage(newCityImage, 0, LATEST_CITY_HEIGHT * TILE_SIZE, 
                            MAP_PIXEL_WIDTH, NEW_CITY_HEIGHT * TILE_SIZE);
            
            // Draw pallet city directly after the new city
            ctx.drawImage(palletCityImage, 0, (LATEST_CITY_HEIGHT + NEW_CITY_HEIGHT) * TILE_SIZE, 
                            MAP_PIXEL_WIDTH, PALLET_CITY_HEIGHT * TILE_SIZE);
            
            ctx.restore();
        }

        // Draw the player
        function drawPlayer() {
            ctx.save();
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            // Apply the animation offset to the player's Y position when drawing
            ctx.drawImage(currentPlayerSprite, player.x, player.y + player.animationOffset, player.width, player.height);
            ctx.strokeStyle = 'transparent';
            ctx.lineWidth = 1 / camera.zoom;
            ctx.strokeRect(player.x, player.y + player.animationOffset, player.width, player.height);
            ctx.restore();
        }
        
        // Draw the NPCs
        function drawNPCs() {
            ctx.save();
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            
            for (const npc of npcs) {
                // Apply the animation offset to the NPC's Y position when drawing
                ctx.drawImage(npc.sprite, npc.x, npc.y + npc.animationOffset, npc.width, npc.height);
            }
            ctx.restore();
        }

        // ── Menu item hit-boxes (populated each frame) ────────────────
        const menuItemRects = [];

        // Handle menu selection
        function handleMenuSelect() {
            if (menuIndex === 0) {
                // New Game — go to character selection (keep music playing)
                gameState = 'character_selection';
                characterIndex = 0;
            } else if (menuIndex === 1) {
                // Load Game — open the save overlay (loadSave will start the game)
                stopMenuMusic();
                openSaveMenu();
            } else if (menuIndex === 2) {
                // Quit
                stopMenuMusic();
                window.close();
                // Fallback message if window.close() is blocked
                gameState = 'quit';
            }
        }

        // Load player sprite based on character name
        function loadPlayerSprite(characterName) {
            const spritePath = `sprites/${characterName}idle.png`;
            playerSprites.s.src = spritePath;
            playerSprites.w.src = spritePath;
            playerSprites.a.src = spritePath;
            playerSprites.d.src = spritePath;
            currentPlayerSprite = playerSprites.s;
        }

        // Handle character selection
        function handleCharacterSelect() {
            selectedCharacter = CHARACTERS[characterIndex];
            loadPlayerSprite(selectedCharacter);
            stopMenuMusic();
            gameState = 'playing';
            startPlayTimer();
            document.getElementById('saveHint').style.display = 'block';
        }

        // Canvas click → map to menu items
        canvas.addEventListener('click', (e) => {
            if (gameState !== 'menu') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width  / rect.width;
            const scaleY = canvas.height / rect.height;
            const cx = (e.clientX - rect.left)  * scaleX;
            const cy = (e.clientY - rect.top)   * scaleY;
            menuItemRects.forEach((r, i) => {
                if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
                    menuIndex = i;
                    handleMenuSelect();
                }
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'menu') return;
            const rect  = canvas.getBoundingClientRect();
            const scaleX = canvas.width  / rect.width;
            const scaleY = canvas.height / rect.height;
            const cx = (e.clientX - rect.left) * scaleX;
            const cy = (e.clientY - rect.top)  * scaleY;
            menuItemRects.forEach((r, i) => {
                if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
                    menuIndex = i;
                }
            });
        });

        // Draw the start menu
        function drawStartMenu() {
            const w = canvas.width;
            const h = canvas.height;

            // Background
            if (startMenuBg.complete && startMenuBg.naturalWidth > 0) {
                ctx.drawImage(startMenuBg, 0, 0, w, h);
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0a0a1a');
                grad.addColorStop(1, '#1a3a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }

            // Dark overlay removed for brighter background

            // ── Title area (top half) ──────────────────────────────────
            ctx.textAlign = 'center';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 28;
            // POKÉMON text removed

            // ADVENTURE text removed

            // City text removed

            // ── Menu panel ────────────────────────────────────────────
            const panelW = 380;
            const panelH = 210;
            const panelX = (w - panelW) / 2;
            const panelY = h * 0.53;

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(8,16,34,0.88)';
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(panelX, panelY, panelW, panelH, 14);
            ctx.fill();
            ctx.stroke();

            // Inner subtle border
            ctx.strokeStyle = 'rgba(255,215,0,0.18)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(panelX + 8, panelY + 8, panelW - 16, panelH - 16, 9);
            ctx.stroke();

            // ── Menu items ────────────────────────────────────────────
            menuItemRects.length = 0;
            const itemH   = 52;
            const itemGap = 6;
            const totalH  = MENU_ITEMS.length * itemH + (MENU_ITEMS.length - 1) * itemGap;
            const startY  = panelY + (panelH - totalH) / 2;

            MENU_ITEMS.forEach((label, i) => {
                const iy  = startY + i * (itemH + itemGap);
                const ix  = panelX + 24;
                const iw  = panelW - 48;
                const selected = i === menuIndex;

                // Store hit rect for mouse interaction
                menuItemRects.push({ x: ix, y: iy, w: iw, h: itemH });

                // Item background
                if (selected) {
                    const grad = ctx.createLinearGradient(ix, iy, ix + iw, iy);
                    grad.addColorStop(0, 'rgba(255,215,0,0.18)');
                    grad.addColorStop(0.5, 'rgba(255,215,0,0.1)');
                    grad.addColorStop(1, 'rgba(255,215,0,0.18)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(ix, iy, iw, itemH, 8);
                    ctx.fill();
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(ix, iy, iw, itemH, 8);
                    ctx.stroke();
                }

                // Cursor arrow
                const textCenterY = iy + itemH / 2;
                if (selected) {
                    const blinkOn = Math.floor(Date.now() / 400) % 2 === 0;
                    ctx.fillStyle = blinkOn ? '#FFD700' : 'rgba(255,215,0,0.4)';
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = blinkOn ? 10 : 3;
                    ctx.font = 'bold 20px "Courier New", monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText('▶', ix + 14, textCenterY + 7);
                }

                // Label
                ctx.shadowBlur = selected ? 8 : 0;
                ctx.shadowColor = selected ? '#FFD700' : 'transparent';
                ctx.fillStyle = selected ? '#FFD700' : '#aabbcc';
                ctx.font = `${selected ? 'bold' : 'normal'} 22px "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.fillText(label, panelX + panelW / 2, textCenterY + 8);
            });

            // ── Bottom hint ───────────────────────────────────────────
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#334455';
            ctx.font = '13px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('↑ ↓  NAVIGATE     ENTER / CLICK  SELECT', w / 2, panelY + panelH + 28);

            // Music note indicator
            if (musicPlaying) {
                const blinkOn = Math.floor(Date.now() / 500) % 2 === 0;
                ctx.fillStyle = blinkOn ? 'rgba(255,215,0,0.7)' : 'rgba(255,215,0,0.25)';
                ctx.font = '15px "Courier New", monospace';
                ctx.fillText('♪ ♫', w / 2, panelY + panelH + 52);
            } else {
                ctx.fillStyle = '#223344';
                ctx.font = '12px "Courier New", monospace';
                ctx.fillText('[ move mouse or press a key to start music ]', w / 2, panelY + panelH + 52);
            }

            ctx.shadowBlur = 0;
            ctx.textAlign = 'left';
        }

        // Draw character selection screen
        function drawCharacterSelection() {
            const w = canvas.width;
            const h = canvas.height;

            // Background
            if (startMenuBg.complete && startMenuBg.naturalWidth > 0) {
                ctx.drawImage(startMenuBg, 0, 0, w, h);
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, h);
                grad.addColorStop(0, '#0a0a1a');
                grad.addColorStop(1, '#1a3a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }

            // Title
            ctx.textAlign = 'center';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 28;
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 60px "Courier New", monospace';
            ctx.fillText('SELECT CHARACTER', w / 2, h * 0.15);

            // Character display area
            const displayWidth = 600;
            const displayHeight = 300;
            const displayX = (w - displayWidth) / 2;
            const displayY = h * 0.3;

            // Panel background
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(8,16,34,0.88)';
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(displayX, displayY, displayWidth, displayHeight, 14);
            ctx.fill();
            ctx.stroke();

            // Draw character portrait
            const currentCharacter = CHARACTERS[characterIndex];
            const portrait = characterPortraits[currentCharacter];
            const portraitSize = 180; // 1:1 square size
            const portraitX = (w - portraitSize) / 2;
            const portraitY = displayY + 20;
            
            if (portrait && portrait.complete && portrait.naturalWidth > 0) {
                ctx.drawImage(portrait, portraitX, portraitY, portraitSize, portraitSize);
            }

            // Current character name (large)
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#FFD700';
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 48px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(CHARACTERS[characterIndex].toUpperCase(), w / 2, portraitY + portraitSize + 50);

            // Character index indicator
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#7799bb';
            ctx.font = '16px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${characterIndex + 1} / ${CHARACTERS.length}`, w / 2, portraitY + portraitSize + 80);

            // Navigation hints
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#334455';
            ctx.font = '14px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('← → / A D  NAVIGATE', w / 2, displayY + displayHeight - 40);
            ctx.fillText('ENTER  CONFIRM     ESC  BACK', w / 2, displayY + displayHeight - 10);

            // Show previous and next character names (dimmed)
            const prevIdx = (characterIndex - 1 + CHARACTERS.length) % CHARACTERS.length;
            const nextIdx = (characterIndex + 1) % CHARACTERS.length;

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(119,153,187,0.5)';
            ctx.font = '18px "Courier New", monospace';
            ctx.textAlign = 'right';
            ctx.fillText('◄ ' + CHARACTERS[prevIdx].toUpperCase(), displayX - 20, displayY + 100);
            ctx.textAlign = 'left';
            ctx.fillText(CHARACTERS[nextIdx].toUpperCase() + ' ►', displayX + displayWidth + 20, displayY + 100);
        }

        // Draw "QUIT" screen if window.close() was blocked
        function drawQuitScreen() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 32px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Thanks for playing!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = '#556677';
            ctx.font = '16px "Courier New", monospace';
            ctx.fillText('You can close this tab.', canvas.width / 2, canvas.height / 2 + 20);
            ctx.textAlign = 'left';
        }

        // Game loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'menu') {
                drawStartMenu();
            } else if (gameState === 'character_selection') {
                drawCharacterSelection();
            } else if (gameState === 'quit') {
                drawQuitScreen();
            } else {
                updatePlayer();
                updateNPCs();
                updateCamera();
                drawMap();
                drawPlayer();
                drawNPCs();
            }

            requestAnimationFrame(gameLoop);
        }

        // Load all assets before starting the game loop
        let assetsLoaded = 0;
        const totalAssets = 3 + Object.keys(playerSprites).length + npcSprites.length; // 3 map images + 4 player sprites + 14 npc sprites

        function assetLoaded() {
            assetsLoaded++;
            if (assetsLoaded === totalAssets) {
                gameLoop();
            }
        }

        latestCityImage.onload = assetLoaded;
        latestCityImage.onerror = () => {
            console.error("Failed to load latest city map image");
            assetLoaded();
        };

        newCityImage.onload = assetLoaded;
        newCityImage.onerror = () => {
            console.error("Failed to load new city map image");
            assetLoaded();
        };

        palletCityImage.onload = assetLoaded;
        palletCityImage.onerror = () => {
            console.error("Failed to load pallet city map image");
            assetLoaded();
        };

        for (const key in playerSprites) {
            playerSprites[key].onload = assetLoaded;
            playerSprites[key].onerror = () => {
                console.error(`Failed to load player sprite: ${playerSprites[key].src}`);
                assetLoaded(); // Still call assetLoaded to proceed even if one asset fails
            };
        }
        
        for (const npc of npcSprites) {
            npc.onload = assetLoaded;
            npc.onerror = () => {
                console.error(`Failed to load NPC sprite: ${npc.src}`);
                assetLoaded();
            };
        }
        // ─── Save / Load System ────────────────────────────────────────
        const API = 'api/saves.php';
        let saveMenuOpen = false;
        let playTimeSeconds = 0;
        let playTimerInterval = null;

        function startPlayTimer() {
            if (playTimerInterval) return;
            playTimerInterval = setInterval(() => {
                if (gameState === 'playing' && !saveMenuOpen) playTimeSeconds++;
            }, 1000);
        }

        function getCurrentCityName() {
            const py = player.y / TILE_SIZE;
            if (py < LATEST_CITY_HEIGHT) return 'Latest City';
            if (py < LATEST_CITY_HEIGHT + 1 + NEW_CITY_HEIGHT) return 'New City';
            return 'Pallet City';
        }

        function showMsg(text, isError = false) {
            const el = document.getElementById('saveMsg');
            el.textContent = text;
            el.className = isError ? 'error' : '';
            setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 3000);
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function renderSaves(saves) {
            const list = document.getElementById('savesList');
            if (!saves.length) {
                list.innerHTML = '<div id="noSaves">No saves yet. Start playing and save your progress!</div>';
                return;
            }
            list.innerHTML = saves.map(s => {
                const d = new Date(s.savedAt);
                const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                return `
                <div class="save-card">
                    <div class="save-card-header">
                        <span class="save-card-name">🎮 ${escHtml(s.saveName)}</span>
                        <span class="save-card-date">${dateStr}</span>
                    </div>
                    <div class="save-card-info">📍 ${escHtml(s.cityName)}  •  ⏱ ${s.playTime}</div>
                    <div class="save-card-actions">
                        <button class="btn btn-load"   onclick="loadSave(${s.id})">📂 LOAD</button>
                        <button class="btn btn-delete" onclick="deleteSave(${s.id}, '${escHtml(s.saveName)}')">🗑 DELETE</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function fetchSaves() {
            try {
                const res  = await fetch(API);
                const data = await res.json();
                if (data.success) renderSaves(data.saves);
                else showMsg('Could not load saves', true);
            } catch {
                showMsg('⚠ Could not reach saves.php. Is Laragon running?', true);
            }
        }

        async function saveGame() {
            const nameInput = document.getElementById('newSaveName');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.focus();
                nameInput.style.borderColor = '#ff4444';
                setTimeout(() => nameInput.style.borderColor = '', 1000);
                showMsg('⚠ Please enter a save name first!', true);
                return;
            }
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        saveName:        name,
                        playerX:         player.x,
                        playerY:         player.y,
                        cityName:        getCurrentCityName(),
                        playTimeSeconds: playTimeSeconds,
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showMsg('✅ ' + data.message);
                    nameInput.value = '';
                    fetchSaves();
                } else {
                    showMsg('❌ ' + data.error, true);
                }
            } catch {
                showMsg('❌ Could not reach saves.php. Is Laragon running?', true);
            }
        }

        async function loadSave(id) {
            try {
                const res  = await fetch(API + '?id=' + id);
                const data = await res.json();
                if (data.success) {
                    player.x = data.save.playerX;
                    player.y = data.save.playerY;
                    playTimeSeconds = data.save.playTimeRaw || 0;
                    gameState = 'playing';
                    startPlayTimer();
                    document.getElementById('saveHint').style.display = 'block';
                    showMsg('✅ Loaded "' + data.save.saveName + '"!');
                    closeSaveMenu();
                } else {
                    showMsg('❌ ' + data.error, true);
                }
            } catch {
                showMsg('❌ Could not reach saves.php.', true);
            }
        }

        async function deleteSave(id, name) {
            if (!confirm('Delete save "' + name + '"?\nThis cannot be undone.')) return;
            try {
                const res  = await fetch(API + '?id=' + id, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showMsg('🗑 Save deleted');
                    fetchSaves();
                } else {
                    showMsg('❌ ' + data.error, true);
                }
            } catch {
                showMsg('❌ Could not reach saves.php.', true);
            }
        }

        function toggleSaveMenu() { saveMenuOpen ? closeSaveMenu() : openSaveMenu(); }

        function openSaveMenu() {
            saveMenuOpen = true;
            document.getElementById('saveMenu').classList.add('open');
            if (gameState === 'playing') {
                document.getElementById('saveHint').style.display = 'none';
            }
            const nameInput = document.getElementById('newSaveName');
            if (!nameInput.value) nameInput.value = getCurrentCityName();
            fetchSaves();
            setTimeout(() => nameInput.select(), 50);
        }

        function closeSaveMenu() {
            saveMenuOpen = false;
            document.getElementById('saveMenu').classList.remove('open');
            if (gameState === 'playing') {
                document.getElementById('saveHint').style.display = 'block';
            }
        }

        document.getElementById('newSaveName').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.stopPropagation(); saveGame(); }
        });

        setInterval(() => { if (gameState === 'playing') startPlayTimer(); }, 500);
        // ─── End Save System ───────────────────────────────────────────
    </script>
</body>
</html>
